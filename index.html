<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Info-I Master & Physics Game</title>
    <!-- Configure Tailwind BEFORE loading the script -->
    <script>
      tailwind = {
        config: {
          darkMode: 'class',
          theme: {
            extend: {
              fontFamily: {
                sans: ['Helvetica Neue', 'Arial', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', 'sans-serif'],
              }
            }
          }
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-slate-50 min-h-screen text-slate-900 font-sans selection:bg-emerald-500 overflow-hidden relative transition-colors duration-1000">
      
      <!-- GAME SECTION (Background Layer) -->
      <div id="game-container" class="fixed inset-0 z-0 blur-md transition-all duration-1000 flex flex-col items-center justify-center p-2 md:p-4 bg-gradient-to-br from-sky-200 to-blue-100">
        <div class="max-w-6xl w-full mx-auto h-full flex flex-col justify-center">
          
          <!-- Game Header -->
          <header class="mb-2 md:mb-6 flex justify-between items-end bg-white/80 backdrop-blur rounded-xl p-3 md:p-4 shadow-lg border border-white/50 transition-colors duration-1000">
            <div>
              <h1 class="text-xl md:text-3xl font-extrabold text-slate-800 tracking-tight">
                Physics <span class="text-emerald-500">Throw</span>
              </h1>
              <p class="text-slate-500 text-xs md:text-sm">Reward Mini-Game</p>
            </div>
            <div class="text-right">
               <div class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-wider">Session Best</div>
               <div class="text-xl md:text-2xl font-black text-amber-500 font-mono">
                  <span id="val-highscore">0.0</span><span class="text-sm text-slate-400 ml-1">m</span>
               </div>
            </div>
          </header>

          <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 md:gap-8 h-full lg:h-auto content-start lg:content-stretch">
            
            <!-- Main Game Area -->
            <!-- Mobile: Taller aspect ratio (4/3) for better touch area. Desktop: Wider (2/1) -->
            <div class="lg:col-span-3 space-y-4">
              <!-- Game Canvas Container -->
              <div class="relative w-full aspect-[4/3] md:aspect-[2/1] bg-sky-300 overflow-hidden rounded-xl border-4 border-white shadow-2xl transition-colors duration-1000">
                <!-- Background decorations (Day/Night) -->
                <div class="absolute inset-0 bg-gradient-to-b from-transparent to-white/20 transition-colors duration-1000"></div>
                <!-- Ground -->
                <div class="absolute bottom-0 w-full h-1/4 bg-emerald-500/80 transition-colors duration-1000"></div>
                
                <!-- Sun/Moon Decoration -->
                <div class="absolute top-4 right-4 md:top-8 md:right-8 text-4xl md:text-6xl opacity-80 select-none animate-pulse transition-all duration-1000" id="sky-deco">☀️</div>

                <svg 
                  id="game-svg"
                  class="w-full h-full relative z-10"
                  viewBox="0 -35 80 40"
                  preserveAspectRatio="xMidYMax slice"
                >
                  <g id="grp-markers"></g>
                  <g id="grp-particles"></g>
                  <polyline id="elm-trail" points="" fill="none" stroke="rgba(52, 211, 153, 0.8)" stroke-width="0.3" stroke-dasharray="0.5" />
                  <text x="-2" y="0.5" font-size="6" text-anchor="middle" style="filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));">🤖</text>
                  <circle id="elm-ball" cx="0.5" cy="0.15" r="0.6" fill="#34d399" stroke="#064e3b" stroke-width="0.05" />
                </svg>
                
                <!-- HUD Info -->
                <div class="absolute top-2 right-2 md:top-4 md:right-4 flex space-x-2 z-20">
                   <div class="bg-white/80 backdrop-blur-md text-slate-800 px-3 py-1 md:px-4 md:py-2 rounded-lg text-xs md:text-sm font-mono border border-slate-200 shadow-sm transition-colors duration-1000">
                      H: <span id="val-height" class="font-bold">0.0</span>m
                   </div>
                   <div class="bg-white/80 backdrop-blur-md text-slate-800 px-3 py-1 md:px-4 md:py-2 rounded-lg text-xs md:text-sm font-mono border border-slate-200 shadow-sm transition-colors duration-1000">
                      D: <span id="val-distance" class="font-bold text-emerald-600">0.0</span>m
                   </div>
                </div>

                <!-- SKIP Button -->
                <button id="btn-skip" class="hidden absolute bottom-4 right-4 bg-amber-400 hover:bg-amber-500 text-amber-900 font-bold py-2 px-6 rounded-full shadow-lg border-2 border-amber-200 z-30 transition transform hover:scale-105 active:scale-95 animate-pulse">
                  SKIP &gt;&gt;
                </button>

              </div>
              
            </div>

            <!-- Sidebar Controls (Stats Only) -->
            <div class="lg:col-span-1">
              <div class="bg-white/80 backdrop-blur p-4 md:p-6 rounded-xl shadow-lg border border-white h-full flex flex-col transition-colors duration-1000 justify-between">
                <div>
                  <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center">
                    <span class="bg-emerald-100 text-emerald-600 p-2 rounded-lg mr-2">⚡</span>
                    Bonus Items
                  </h2>
                  
                  <div class="grid grid-cols-3 lg:grid-cols-1 gap-2 lg:gap-6">
                    <!-- Power Display -->
                    <div class="bg-slate-50 p-2 md:p-4 rounded-lg border border-slate-200 transition-colors duration-1000">
                      <div class="flex flex-col lg:flex-row justify-between items-center">
                        <label class="text-[10px] lg:text-xs font-bold text-slate-500 uppercase">Power</label>
                        <span id="lbl-power" class="text-sm lg:text-xl font-bold text-emerald-600 font-mono">15</span>
                      </div>
                      <div class="w-full bg-slate-200 rounded-full h-1.5 mt-2 hidden lg:block">
                         <div id="bar-power" class="bg-emerald-500 h-1.5 rounded-full" style="width: 50%"></div>
                      </div>
                    </div>

                    <!-- Loft Display -->
                    <div class="bg-slate-50 p-2 md:p-4 rounded-lg border border-slate-200 transition-colors duration-1000">
                      <div class="flex flex-col lg:flex-row justify-between items-center">
                        <label class="text-[10px] lg:text-xs font-bold text-slate-500 uppercase">Angle</label>
                        <span id="lbl-loft" class="text-sm lg:text-xl font-bold text-emerald-600 font-mono">45°</span>
                      </div>
                      <div class="w-full bg-slate-200 rounded-full h-1.5 mt-2 hidden lg:block">
                         <div id="bar-loft" class="bg-emerald-500 h-1.5 rounded-full" style="width: 50%"></div>
                      </div>
                    </div>

                    <!-- Wind Display -->
                    <div class="bg-slate-50 p-2 md:p-4 rounded-lg border border-slate-200 transition-colors duration-1000">
                      <div class="flex flex-col lg:flex-row justify-between items-center">
                        <label class="text-[10px] lg:text-xs font-bold text-slate-500 uppercase">Assist</label>
                        <span id="lbl-wind" class="text-sm lg:text-xl font-bold text-emerald-600 font-mono">5</span>
                      </div>
                       <div class="w-full bg-slate-200 rounded-full h-1.5 mt-2 hidden lg:block">
                         <div id="bar-wind" class="bg-emerald-500 h-1.5 rounded-full" style="width: 20%"></div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="mt-4 lg:mt-8">
                  <button
                    id="btn-launch"
                    class="w-full py-3 lg:py-5 rounded-xl font-black text-white text-lg lg:text-2xl tracking-wide transition-all transform active:scale-95 shadow-xl bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 shadow-emerald-500/20 flex items-center justify-center gap-2 border-b-4 border-emerald-700"
                  >
                    THROW! 🚀
                  </button>
                  
                  <div class="mt-2 lg:mt-4 text-center text-[10px] lg:text-xs text-slate-400">
                    * Parameters set by quiz score
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- MENU SECTION (Top Page) -->
      <div id="menu-container" class="fixed inset-0 z-50 overflow-y-auto bg-slate-50 transition-colors duration-500">
         <div class="min-h-screen w-full flex flex-col items-center justify-start p-4 md:p-8 relative">
            
            <!-- Menu Top Controls -->
            <div class="absolute top-4 right-4 flex gap-2 md:gap-3 z-50">
               <button id="btn-collection" class="bg-white text-indigo-500 font-bold px-3 py-2 md:px-4 rounded-lg shadow-lg border border-slate-200 text-xs hover:bg-indigo-50 transition-colors flex items-center gap-1">
                 📖 <span class="hidden md:inline">Collection</span>
               </button>
               <!-- Theme button removed here -->
               <button id="btn-reset" class="bg-white text-rose-500 font-bold px-3 py-2 md:px-4 rounded-lg shadow-lg border border-slate-200 text-xs hover:bg-rose-50 transition-colors">
                 RESET
               </button>
            </div>

            <div class="max-w-7xl w-full pt-16 pb-20">
                <div class="text-center mb-10">
                   <h1 class="text-3xl md:text-6xl font-extrabold text-slate-800 drop-shadow-sm tracking-tight mb-2">
                     Info-I <span class="text-emerald-500">Master</span>
                   </h1>
                   <p class="text-slate-500 font-bold text-sm md:text-lg mb-6">
                     最大飛距離＆カードフルコンプを目指そう！
                   </p>

                   <div class="flex flex-col md:flex-row items-stretch justify-center gap-4">
                      <!-- Collection Stats Container -->
                      <div id="collection-stats-container" class="flex flex-wrap justify-center items-center bg-white px-4 py-3 rounded-2xl shadow-md border border-slate-200 gap-4 cursor-pointer hover:shadow-lg hover:border-emerald-400 transition-all transform hover:-translate-y-1 group">
                          <!-- Injected by quiz.js -->
                      </div>

                      <!-- Global Stats -->
                      <div class="flex flex-col items-center justify-center bg-white px-8 py-3 rounded-2xl shadow-md border border-slate-200">
                          <span class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Academy Best</span>
                          <div class="text-2xl md:text-4xl font-black text-amber-500 font-mono flex items-baseline">
                            <span id="val-global-best">0.0</span><span class="text-sm text-slate-400 ml-1">m</span>
                          </div>
                      </div>
                   </div>
                </div>
                
                <div id="genre-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 px-2">
                   <!-- Genres will be injected here -->
                </div>
             </div>
         </div>
      </div>

      <!-- QUIZ SECTION (Overlay Layer) -->
      <div id="quiz-container" class="hidden fixed inset-0 z-50 overflow-y-auto bg-slate-100/95 backdrop-blur-sm flex items-center justify-center p-2 md:p-4 transition-opacity duration-500">
        <!-- Quiz content injected by JS -->
      </div>

      <!-- COLLECTION MODAL (Overlay Layer) -->
      <div id="collection-modal" class="hidden fixed inset-0 z-[60] overflow-y-auto bg-black/80 backdrop-blur-md flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-white w-full max-w-4xl rounded-2xl p-6 shadow-2xl border border-slate-700 max-h-[90vh] flex flex-col">
           <div class="flex justify-between items-center mb-6">
              <h2 class="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2">
                📖 Item Collection
                <span id="col-count" class="text-sm bg-slate-200 px-2 py-1 rounded-md text-slate-600 font-mono">0/30</span>
              </h2>
              <button id="btn-close-collection" class="text-slate-500 hover:text-slate-800 text-2xl">✕</button>
           </div>
           
           <div id="collection-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3 overflow-y-auto custom-scrollbar p-2">
              <!-- Items injected here -->
           </div>
        </div>
      </div>
      
      <!-- Result / Gacha Overlay (Moved out for full screen access on mobile) -->
      <div id="msg-finished" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-white/60 backdrop-blur-sm transition-opacity duration-500">
        <div class="bg-white rounded-2xl p-6 text-center shadow-2xl border-4 border-emerald-500 transform scale-100 animate-in zoom-in duration-300 max-w-sm w-full mx-4 flex flex-col items-center overflow-hidden relative">
          
          <!-- Result Phase -->
          <div id="view-result-score" class="w-full relative z-10">
            <h2 class="text-xl font-bold text-slate-500 mb-1 tracking-widest uppercase">RECORD</h2>
            <div class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500 mb-6 font-mono">
              <span id="val-final-score">0.00</span><span class="text-lg text-slate-400 ml-2">m</span>
            </div>
            
            <button id="btn-gacha-draw" class="w-full py-4 bg-gradient-to-r from-amber-400 to-orange-500 text-white rounded-xl font-bold text-xl shadow-lg hover:scale-105 transition-transform flex items-center justify-center gap-2 border-b-4 border-orange-600 animate-bounce">
              🎁 GET ITEM
            </button>
          </div>

          <!-- Gacha Phase -->
          <div id="view-gacha-result" class="hidden w-full flex-col items-center relative z-10">
             <div class="mb-4 text-sm font-bold text-slate-400 uppercase">Item Acquired!</div>
             
             <!-- Background Effect Container -->
             <div id="gacha-effect" class="absolute inset-0 pointer-events-none z-0"></div>

             <!-- Card -->
             <div class="perspective-1000 w-48 h-64 mb-6 cursor-pointer relative z-10" id="gacha-card">
               <div class="card-inner relative w-full h-full transition-transform duration-700">
                 <div class="card-front bg-slate-800 rounded-xl flex items-center justify-center shadow-xl">
                   <div class="text-4xl">?</div>
                 </div>
                 <div id="gacha-card-back" class="card-back rounded-xl border-4 flex flex-col items-center justify-center p-2 bg-white text-slate-800 shadow-xl">
                   <!-- Content injected by JS -->
                 </div>
               </div>
             </div>

             <div id="gacha-msg-new" class="hidden text-amber-500 font-black text-lg mb-2 animate-pulse relative z-10" style="text-shadow: 0 0 10px rgba(255, 180, 0, 0.5);">✨ NEW! ✨</div>

             <button id="btn-restart" class="w-full py-3 bg-slate-700 text-white rounded-lg font-bold hover:bg-slate-600 transition-colors relative z-10">
              🏠 MENU
             </button>
          </div>

        </div>
      </div>
    
    <script type="module" src="quiz.js"></script>
  </body>
</html>
